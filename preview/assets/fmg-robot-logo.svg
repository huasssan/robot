    <text x="83" y="55" fill="#6b756d" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace" font-size="8.5" font-weight="650" letter-spacing="1.4">ROBOT OPS</text>
