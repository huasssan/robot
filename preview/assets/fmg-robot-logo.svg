<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 72" role="img" aria-labelledby="title desc">
  <title id="title">FMG robot logo</title>
  <desc id="desc">A compact industrial robot head mark with FMG wordmark.</desc>
  <defs>
